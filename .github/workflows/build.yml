name: Build LumoHub APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04 # 使用特定的系统版本

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            m4 \
            ccache \
            autoconf \
            automake \
            libtool \
            openjdk-17-jdk \
            unzip \
            zlib1g-dev \
            libncurses5-dev \
            libgdbm-dev \
            libnss3-dev \
            libreadline-dev \
            libdb5.3-dev \
            libbz2-dev \
            libexpat1-dev \
            liblzma-dev \
            tk-dev \
            uuid-dev \
            libgdbm-compat-dev
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # 自动同意 SDK 协议并开始打包
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # 必须升级到 v4 以解决报错
        with:
          name: LumoHub-APK
          path: bin/*.apk
name: Build LumoHub APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libffi-dev libssl-dev libsqlite3-dev m4 ccache \
            autoconf automake libtool openjdk-17-jdk unzip zlib1g-dev \
            libncurses5-dev libgdbm-dev libnss3-dev libreadline-dev \
            libdb5.3-dev libbz2-dev libexpat1-dev liblzma-dev tk-dev \
            uuid-dev libgdbm-compat-dev cmake ninja-build
          pip install --user --upgrade Cython==0.29.33 buildozer virtualenv

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer android clean
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LumoHub-Final-APK
          path: bin/*.apk